<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>图片压缩工具</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#0f1117;color:#e2e8f0;min-height:100vh;padding:24px 16px}

.app{max-width:960px;margin:0 auto}

/* Header */
.header{text-align:center;margin-bottom:32px;position:relative}
.header h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#60a5fa,#a78bfa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.header p{color:#64748b;font-size:.9rem}

/* Settings Panel */
.settings{background:#1e2130;border:1px solid #2d3550;border-radius:16px;padding:20px;margin-bottom:20px}
.settings-title{font-size:.8rem;font-weight:600;color:#64748b;text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:16px}
.settings-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.setting-item label{display:block;font-size:.82rem;color:#94a3b8;margin-bottom:6px}
.setting-item select,.setting-item input[type=range]{width:100%}
.setting-item input[type=range]{-webkit-appearance:none;height:4px;background:#2d3550;
  border-radius:2px;outline:none}
.setting-item input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;
  background:linear-gradient(135deg,#60a5fa,#a78bfa);border-radius:50%;cursor:pointer}
.range-value{display:inline-block;background:#2d3550;color:#60a5fa;font-size:.78rem;
  padding:2px 8px;border-radius:6px;margin-top:4px;min-width:48px;text-align:center}
select{background:#2d3550;color:#e2e8f0;border:1px solid #3d4a6b;border-radius:8px;
  padding:8px 12px;font-size:.88rem;cursor:pointer;outline:none}
select:focus{border-color:#60a5fa}

/* Max size input */
.setting-item input[type=number]{background:#2d3550;color:#e2e8f0;border:1px solid #3d4a6b;
  border-radius:8px;padding:8px 12px;font-size:.88rem;width:100%;outline:none}
.setting-item input[type=number]:focus{border-color:#60a5fa}
.input-unit{display:flex;align-items:center;gap:6px}
.unit-label{color:#64748b;font-size:.82rem;white-space:nowrap}

/* Drop Zone */
.drop-zone{border:2px dashed #2d3550;border-radius:16px;padding:48px 20px;text-align:center;
  cursor:pointer;transition:all .2s;position:relative;margin-bottom:20px}
.drop-zone:hover,.drop-zone.drag-over{border-color:#60a5fa;background:rgba(96,165,250,.05)}
.drop-zone .icon{font-size:3rem;margin-bottom:12px;display:block}
.drop-zone h3{font-size:1rem;color:#94a3b8;margin-bottom:6px}
.drop-zone p{font-size:.82rem;color:#475569}
.drop-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}

/* Actions */
.actions{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.btn{padding:10px 24px;border:none;border-radius:10px;font-size:.9rem;font-weight:600;
  cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,#60a5fa,#a78bfa);color:#fff}
.btn-primary:hover{opacity:.9;transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(96,165,250,.35)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-secondary{background:#1e2130;border:1px solid #2d3550;color:#94a3b8}
.btn-secondary:hover{border-color:#60a5fa;color:#60a5fa}
.btn-danger{background:#1e2130;border:1px solid #3d1515;color:#f87171}
.btn-danger:hover{background:#2d1515}

/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#1e2130;border:1px solid #2d3550;border-radius:12px;padding:14px;text-align:center}
.stat-card .num{font-size:1.5rem;font-weight:700;color:#60a5fa}
.stat-card .lbl{font-size:.72rem;color:#475569;margin-top:3px}
.saved-num{color:#34d399 !important}

/* File List */
.file-list{display:flex;flex-direction:column;gap:10px}
.file-item{background:#1e2130;border:1px solid #2d3550;border-radius:12px;padding:14px 16px;
  display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;
  transition:border-color .2s}
.file-item.done{border-color:#1d4d3a}
.file-item.error{border-color:#4d1d1d}
.file-item.processing{border-color:#3d3a1d}

.thumb-wrap{width:52px;height:52px;border-radius:8px;overflow:hidden;background:#2d3550;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.thumb-wrap img{width:100%;height:100%;object-fit:cover}

.file-info{}
.file-name{font-size:.9rem;font-weight:500;color:#e2e8f0;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;max-width:360px}
.file-meta{display:flex;gap:10px;margin-top:5px;flex-wrap:wrap}
.meta-tag{font-size:.72rem;padding:2px 8px;border-radius:6px}
.tag-size{background:#1a2540;color:#60a5fa}
.tag-dim{background:#1a2030;color:#94a3b8}
.tag-new-size{background:#1a3a2a;color:#34d399}
.tag-saved{background:#2a1a3a;color:#a78bfa;font-weight:700}
.tag-error{background:#3a1a1a;color:#f87171}
.tag-processing{background:#2a2a1a;color:#fbbf24}
.tag-warning{background:#3a2a1a;color:#fbbf24}

.file-action{display:flex;gap:6px;align-items:center;flex-shrink:0}
.btn-sm{width:32px;height:32px;border:1px solid #2d3550;background:#2d3550;border-radius:8px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:.85rem;transition:all .15s;color:#94a3b8}
.btn-sm:hover{border-color:#60a5fa;color:#60a5fa}
.btn-sm.download{border-color:#1d4d3a;color:#34d399}
.btn-sm.download:hover{background:#1d4d3a}

/* Progress */
.progress-wrap{width:80px;height:4px;background:#2d3550;border-radius:2px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#60a5fa,#a78bfa);
  width:0%;transition:width .3s;border-radius:2px}

/* Empty */
.empty{text-align:center;padding:40px;color:#475569;font-size:.88rem}

/* Notification */
.notif{position:fixed;bottom:24px;right:24px;background:#1e2130;border:1px solid #2d3550;
  border-radius:12px;padding:12px 18px;font-size:.88rem;color:#e2e8f0;
  box-shadow:0 8px 32px rgba(0,0,0,.4);transform:translateX(120%);
  transition:transform .3s;z-index:100;max-width:300px}
.notif.show{transform:translateX(0)}
.notif.success{border-color:#1d4d3a;color:#34d399}
.notif.error{border-color:#4d1d1d;color:#f87171}
.notif.warning{border-color:#3a2a1a;color:#fbbf24}

@media(max-width:600px){
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .file-name{max-width:180px}
  .actions{flex-direction:column}
  .btn{justify-content:center}
}
</style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <div class="header">
    <h1>🖼️ 图片压缩工具</h1>
    <p>保持画质，智能压缩 · 支持 JPG / PNG / WebP · 图片本地处理，不上传图片文件</p>
  </div>

  <!-- Settings -->
  <div class="settings">
    <div class="settings-title">⚙️ 压缩设置</div>
    <div class="settings-grid">
      <div class="setting-item">
        <label>输出格式</label>
        <select id="outFormat">
          <option value="original">保持原格式</option>
          <option value="jpeg">统一转 JPG</option>
          <option value="png">统一转 PNG</option>
          <option value="webp">统一转 WebP（更小）</option>
        </select>
      </div>
      <div class="setting-item">
        <label>最大文件大小限制</label>
        <div class="input-unit">
          <input type="number" id="maxFileMB" value="0" min="0" max="100" step="0.1" onfocus="this.select()"/>
          <span class="unit-label">MB（0=不限）</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <span class="icon">📂</span>
    <h3>拖拽图片到这里 或 点击选择</h3>
    <p>支持 JPG / PNG / WebP / BMP · 可同时选择多张</p>
    <input type="file" id="fileInput" accept="image/*" multiple/>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" id="btnCompress" onclick="compressAll()" disabled>
      ⚡ 一键压缩全部
    </button>
    <button class="btn btn-primary" onclick="downloadAll()" id="btnDownload" disabled>
      📦 打包下载全部
    </button>
    <button class="btn btn-secondary" onclick="clearAll()">
      🗑️ 清空列表
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-card">
      <div class="num" id="sTotalFiles">0</div>
      <div class="lbl">文件数量</div>
    </div>
    <div class="stat-card">
      <div class="num" id="sOrigSize">—</div>
      <div class="lbl">原始总大小</div>
    </div>
    <div class="stat-card">
      <div class="num" id="sNewSize">—</div>
      <div class="lbl">压缩后大小</div>
    </div>
    <div class="stat-card">
      <div class="num saved-num" id="sSaved">—</div>
      <div class="lbl">节省空间</div>
    </div>
  </div>

  <!-- File List -->
  <div class="file-list" id="fileList">
    <div class="empty" id="emptyHint">还没有添加图片，拖拽或点击上方区域添加</div>
  </div>

</div>

<!-- Notification -->
<div class="notif" id="notif"></div>

<script>
// ─── State ───────────────────────────────────────────────
const files = []; // {id, file, thumb, origSize, origW, origH, blob, newSize, newW, newH, status, errorMsg, isGif}
let idCnt = 0;
const MAX_FILE_SIZE = 200 * 1024 * 1024; // 200MB 文件大小上限保护

// ─── DOM Helpers ─────────────────────────────────────────
const $  = id => document.getElementById(id);
const dropZone  = $('dropZone');
const fileInput = $('fileInput');
const fileList  = $('fileList');

// ─── 全局阻止默认拖拽行为（防止浏览器直接打开文件） ──
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => {
  document.body.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); });
});

// ─── File Input ──────────────────────────────────────────
fileInput.addEventListener('change', e => addFiles(e.target.files));
dropZone.addEventListener('dragenter', () => dropZone.classList.add('drag-over'));
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  dropZone.classList.remove('drag-over');
  addFiles(e.dataTransfer.files);
});

function addFiles(fileList) {
  let added = 0, skippedLarge = 0, skippedGif = 0;
  for (const f of fileList) {
    if (!f.type.startsWith('image/')) continue;

    // BUG-2: 超大文件保护 (>200MB)
    if (f.size > MAX_FILE_SIZE) {
      skippedLarge++;
      continue;
    }

    const id = ++idCnt;
    const isGif = f.type === 'image/gif';
    if (isGif) skippedGif++;

    const entry = { id, file: f, thumb: null, origSize: f.size,
                    origW: 0, origH: 0, blob: null, newSize: 0, newW: 0, newH: 0,
                    status: 'ready', errorMsg: '', isGif: isGif };
    files.push(entry);
    loadThumb(entry);
    added++;
  }
  if (added) { renderList(); updateBtns(); }
  if (skippedLarge) showNotif(`⚠️ ${skippedLarge} 个文件超过 200MB，已跳过（防止浏览器崩溃）`, 'warning');
}

function loadThumb(entry) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      entry.origW = img.naturalWidth;
      entry.origH = img.naturalHeight;
      entry.thumb = e.target.result;
      renderItem(entry);
    };
    img.onerror = () => {
      entry.status = 'error';
      entry.errorMsg = '图片加载失败';
      renderItem(entry);
    };
    img.src = e.target.result;
  };
  reader.onerror = () => {
    entry.status = 'error';
    entry.errorMsg = '文件读取失败';
    renderItem(entry);
  };
  reader.readAsDataURL(entry.file);
}

// ─── Compress ────────────────────────────────────────────
async function compressAll() {
  // 重新压缩前先重置所有非处理中的文件状态
  const toProcess = files.filter(f => f.status !== 'processing');
  if (!toProcess.length) { showNotif('没有需要压缩的文件', 'error'); return; }

  // 重置所有 blob 和状态，让统计不残留旧数据
  toProcess.forEach(f => { f.blob = null; f.newSize = 0; f.status = 'ready'; f.errorMsg = ''; });
  updateStats();

  $('btnCompress').disabled = true;
  $('btnCompress').textContent = '⏳ 压缩中...';
  $('statsBar').style.display = 'grid';

  let successCount = 0, failCount = 0;
  for (const entry of toProcess) {
    entry.status = 'processing';
    entry.errorMsg = '';
    renderItem(entry);
    try {
      await compressOne(entry);
      entry.status = 'done';
      successCount++;
    } catch(e) {
      entry.status = 'error';
      entry.errorMsg = e.message || '未知错误';
      failCount++;
    }
    renderItem(entry);
    updateStats(); // 实时更新统计
  }

  $('btnCompress').disabled = false;
  $('btnCompress').innerHTML = '⚡ 一键压缩全部';
  if (successCount > 0) $('btnDownload').disabled = false;

  let msg = `✅ 完成 ${successCount} 张`;
  if (failCount > 0) msg += `，${failCount} 张失败`;
  showNotif(msg, failCount > 0 ? 'warning' : 'success');
}

async function compressOne(entry) {
  const quality  = 1.0;
  const maxMB    = parseFloat($('maxFileMB').value) || 0;
  const maxKB    = maxMB > 0 ? maxMB * 1024 : 0;
  const outFmt   = $('outFormat').value;

  const img = await loadImage(entry.thumb || URL.createObjectURL(entry.file));

  let w = img.naturalWidth, h = img.naturalHeight;

  // 最长边超过 6000 像素时自动等比缩放
  if (Math.max(w, h) > 6000) {
    if (w >= h) { h = Math.round(h * 6000 / w); w = 6000; }
    else        { w = Math.round(w * 6000 / h); h = 6000; }
  }

  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0, w, h);

  // Determine mime
  let mime = 'image/jpeg';
  if (outFmt === 'original') {
    mime = entry.file.type === 'image/png'  ? 'image/png'  :
           entry.file.type === 'image/webp' ? 'image/webp' : 'image/jpeg';
  } else if (outFmt === 'png')  mime = 'image/png';
  else if (outFmt === 'webp') mime = 'image/webp';

  let q = quality;
  let blob;
  let converted = false; // 是否发生了格式转换

  // PNG + 大小限制 → 自动转 WebP（PNG 不支持有损压缩）
  if (maxKB > 0 && mime === 'image/png') {
    let targetMime = 'image/webp';
    converted = true;
    let lo = 0.1, hi = quality, best = null;
    for (let i = 0; i < 10; i++) {
      const mid = (lo + hi) / 2;
      const b = await canvasToBlob(canvas, targetMime, mid);
      if (b.size <= maxKB * 1024) { best = b; lo = mid; }
      else { hi = mid; }
    }
    blob = best || await canvasToBlob(canvas, targetMime, 0.1);
  } else if (maxKB > 0) {
    // JPG/WebP + 大小限制：二分搜索
    let lo = 0.1, hi = quality, best = null;
    for (let i = 0; i < 10; i++) {
      const mid = (lo + hi) / 2;
      const b = await canvasToBlob(canvas, mime, mid);
      if (b.size <= maxKB * 1024) { best = b; lo = mid; }
      else { hi = mid; }
    }
    blob = best || await canvasToBlob(canvas, mime, 0.1);
  } else if (mime === 'image/png') {
    // PNG 不限大小：尝试用 WebP 压缩，若更小则用 WebP，否则保留 PNG
    const pngBlob  = await canvasToBlob(canvas, 'image/png', 1);
    const webpBlob = await canvasToBlob(canvas, 'image/webp', quality);
    if (webpBlob.size < pngBlob.size) {
      blob = webpBlob;
      converted = true;
    } else {
      blob = pngBlob;
    }
  } else {
    blob = await canvasToBlob(canvas, mime, q);
  }

  entry.blob   = blob;
  entry.newSize = blob.size;
  entry.newW   = w;
  entry.newH   = h;
  entry.converted = converted;
}

function canvasToBlob(canvas, mime, quality) {
  return new Promise(res => canvas.toBlob(res, mime, quality));
}

function loadImage(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload  = () => res(img);
    img.onerror = () => rej(new Error('加载图片失败'));
    img.src = src;
  });
}

// ─── Download ────────────────────────────────────────────
// BUG-1: 文件名去重，防止 _compressed_compressed...
function getOutputName(entry) {
  const ext = entry.blob.type === 'image/png'  ? 'png'  :
              entry.blob.type === 'image/webp' ? 'webp' : 'jpg';
  let base = entry.file.name.replace(/\.[^.]+$/, '');
  // 去掉已有的 _compressed 后缀
  base = base.replace(/_compressed$/, '');
  return `${base}_compressed.${ext}`;
}

function downloadOne(entry) {
  if (!entry.blob) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(entry.blob);
  a.download = getOutputName(entry);
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}

async function downloadAll() {
  const done = files.filter(f => f.status === 'done' && f.blob);
  if (!done.length) { showNotif('还没有压缩完成的文件', 'error'); return; }
  if (done.length === 1) { downloadOne(done[0]); return; }

  // If JSZip available
  if (typeof JSZip !== 'undefined') {
    const zip = new JSZip();
    done.forEach(e => {
      zip.file(getOutputName(e), e.blob);
    });
    const content = await zip.generateAsync({ type: 'blob' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = 'compressed_images.zip';
    a.click();
  } else {
    // Fallback: download one by one
    for (const e of done) { downloadOne(e); await sleep(300); }
  }
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

// ─── Clear ───────────────────────────────────────────────
function clearAll() {
  files.length = 0;
  renderList();
  updateBtns();
  updateStats();
  $('btnDownload').disabled = true;
  $('statsBar').style.display = 'none';
}

function removeFile(id) {
  const idx = files.findIndex(f => f.id === id);
  if (idx >= 0) files.splice(idx, 1);
  renderList();
  updateBtns();
  updateStats();
}

// ─── Render ──────────────────────────────────────────────
function renderList() {
  if (!files.length) {
    fileList.innerHTML = '<div class="empty" id="emptyHint">还没有添加图片，拖拽或点击上方区域添加</div>';
    return;
  }
  fileList.innerHTML = files.map(f => itemHTML(f)).join('');
}

function renderItem(entry) {
  const el = document.getElementById(`item-${entry.id}`);
  if (el) el.outerHTML = itemHTML(entry);
  else renderList();
}

function itemHTML(e) {
  const origStr  = fmtSize(e.origSize);
  const dimStr   = e.origW ? `${e.origW}×${e.origH}` : '—';
  const statusCls = e.status === 'done' ? 'done' : e.status === 'error' ? 'error' :
                    e.status === 'processing' ? 'processing' : '';

  let metaTags = `<span class="meta-tag tag-size">原 ${origStr}</span>
                  <span class="meta-tag tag-dim">${dimStr}</span>`;

  // BUG-3: GIF 标记提示
  if (e.isGif) {
    metaTags += `<span class="meta-tag tag-warning">GIF 仅第一帧</span>`;
  }

  if (e.status === 'done' && e.blob) {
    const saved = Math.round((1 - e.newSize / e.origSize) * 100);
    const newStr = fmtSize(e.newSize);
    const newDim = `${e.newW}×${e.newH}`;
    let formatNote = '';
    // BUG-5: 显示格式转换提示
    if (e.converted) {
      const origExt = e.file.type === 'image/png' ? 'PNG' : e.file.type.split('/')[1].toUpperCase();
      const newExt = e.blob.type === 'image/webp' ? 'WebP' : e.blob.type.split('/')[1].toUpperCase();
      formatNote = `<span class="meta-tag tag-warning">${origExt}→${newExt}</span>`;
    }
    metaTags += `<span class="meta-tag tag-new-size">压后 ${newStr}</span>
                 <span class="meta-tag tag-dim">${newDim}</span>
                 ${formatNote}
                 <span class="meta-tag tag-saved">↓${saved}%</span>`;
  } else if (e.status === 'processing') {
    metaTags += `<span class="meta-tag tag-processing">⏳ 压缩中...</span>`;
  } else if (e.status === 'error') {
    // BUG-6: 显示具体错误原因
    metaTags += `<span class="meta-tag tag-error">❌ ${e.errorMsg || '失败'}</span>`;
  }

  const downloadBtn = e.status === 'done' ?
    `<button class="btn-sm download" title="下载" onclick="downloadOne(files.find(f=>f.id==${e.id}))">↓</button>` : '';

  const thumb = e.thumb ? `<img src="${e.thumb}" alt=""/>` : `<span style="color:#475569;font-size:.7rem">loading</span>`;

  return `
    <div class="file-item ${statusCls}" id="item-${e.id}">
      <div class="thumb-wrap">${thumb}</div>
      <div class="file-info">
        <div class="file-name" title="${e.file.name}">${e.file.name}</div>
        <div class="file-meta">${metaTags}</div>
      </div>
      <div class="file-action">
        ${downloadBtn}
        <button class="btn-sm" title="移除" onclick="removeFile(${e.id})">✕</button>
      </div>
    </div>`;
}

function updateBtns() {
  $('btnCompress').disabled = files.length === 0;
}

function updateStats() {
  if (!files.length) { $('statsBar').style.display = 'none'; return; }

  const doneFiles = files.filter(f => f.blob);
  const origTotal = files.reduce((s, f) => s + f.origSize, 0);
  const newTotal  = doneFiles.reduce((s, f) => s + f.newSize, 0);

  // BUG-4: 只统计已完成的文件
  if (doneFiles.length === 0 && files.some(f => f.status === 'processing')) {
    $('statsBar').style.display = 'grid';
    $('sTotalFiles').textContent = files.length;
    $('sOrigSize').textContent = fmtSize(origTotal);
    $('sNewSize').textContent = '—';
    $('sSaved').textContent = '—';
    return;
  }

  $('statsBar').style.display = 'grid';
  const savedTotal = origTotal - newTotal;
  const savedPct = origTotal > 0 ? Math.round(savedTotal / origTotal * 100) : 0;

  $('sTotalFiles').textContent = files.length;
  $('sOrigSize').textContent   = fmtSize(origTotal);
  $('sNewSize').textContent    = newTotal > 0 ? fmtSize(newTotal) : '—';
  $('sSaved').textContent      = savedTotal > 0 ? `${fmtSize(savedTotal)} (${savedPct}%)` : '—';
}

// ─── Utils ───────────────────────────────────────────────
function fmtSize(bytes) {
  if (bytes < 1024)      return bytes + ' B';
  if (bytes < 1048576)   return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(2) + ' MB';
}

function showNotif(msg, type) {
  const el = $('notif');
  el.textContent = msg;
  el.className = `notif ${type || ''} show`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 4000);
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"
  onerror="console.log('JSZip not loaded, will download one by one')"></script>
